name: Security report
description: Report a private security issue in Toolwall.
title: "[security] "
labels:
  - security
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Provide a short description of the issue without exploit payloads.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - stdio firewall
        - HTTP gateway
        - AST egress filter
        - rate limiting
        - SQLite audit history
        - admin API
        - dashboard
        - Docker / container runtime
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction summary
      description: Use minimal steps. Do not include live exploit details in a public issue.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Requested outcome
      description: Private triage and remediation.
    validations:
      required: true
