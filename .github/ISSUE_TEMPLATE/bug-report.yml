name: Bug report
description: Report a reproducible defect in Toolwall runtime, packaging, or documentation.
title: "[bug] "
labels:
  - bug
body:
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - stdio firewall
        - HTTP gateway
        - rate limiting
        - admin API
        - dashboard
        - Docker / container runtime
        - CI / release packaging
        - documentation
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the failure in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include exact commands, payloads, or steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, runtime path, and any relevant flags.
    validations:
      required: true
