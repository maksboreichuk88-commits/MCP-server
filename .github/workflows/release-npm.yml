name: Release npm Package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-root:
    name: Publish Root npm Package
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Check root release tag
        id: root_release
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const expectedTag = `v${packageJson.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;
          const shouldPublish = actualTag === expectedTag;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `publish=${shouldPublish}\n`);
          console.log(shouldPublish
            ? `Root release tag confirmed: ${actualTag}`
            : `Skipping root package publish: expected ${expectedTag}, got ${actualTag}`);
          NODE

      - name: Install dependencies
        if: steps.root_release.outputs.publish == 'true'
        run: npm ci

      - name: Install UI dependencies
        if: steps.root_release.outputs.publish == 'true'
        run: npm --prefix ui ci

      - name: Verify release parity
        if: steps.root_release.outputs.publish == 'true'
        run: npm run verify:release-parity
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Verify
        if: steps.root_release.outputs.publish == 'true'
        run: npm run verify:all

      - name: Publish root package
        if: steps.root_release.outputs.publish == 'true'
        run: npm publish --provenance --access public --workspaces=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published registry metadata
        if: steps.root_release.outputs.publish == 'true'
        run: npm run verify:registry-metadata -- --version "${GITHUB_REF_NAME#v}"
        env:
          EXPECTED_GIT_HEAD: ${{ github.sha }}
